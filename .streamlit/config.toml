# Configuration Streamlit — thème accessible (contrastes WCAG AA).
[theme]
base = "light"
primaryColor = "#0072B2"           # bleu Okabe-Ito, contraste AA sur blanc
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#1A1A1A"              # quasi-noir : contraste ~16:1 sur blanc
font = "sans serif"

[server]
# Limite la taille des uploads (sécurité), le dashboard n'en a pas besoin de gros
maxUploadSize = 5

[browser]
gatherUsageStats = false
